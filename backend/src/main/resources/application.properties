spring.application.name=backend

# Kakao Local API
kakao.api.base-url=https://dapi.kakao.com

# ODsay 대중교통 길찾기 API
odsay.api.base-url=https://api.odsay.com/v1/api

# 실제 키는 application-secret.properties 에 (git 미추적). 파일 없어도 기동되도록 optional.
spring.config.import=optional:classpath:application-secret.properties
